<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORTE X // AI Vision</title>
    <style>
        :root {
            --bg: #030307;
            --panel: #0b0c16;
            --accent: #00ffaa;
            --accent-dim: rgba(0, 255, 170, 0.15);
            --text: #ffffff;
            --text-muted: #4e5569;
            --border: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Ambient HUD glow in the background */
        body::before {
            content: '';
            position: absolute;
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(0, 255, 170, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .hud-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 2.5rem;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        @media (max-width: 768px) {
            .hud-container { grid-template-columns: 1fr; padding: 1.5rem; }
        }

        /* Left Column: Camera and Deck */
        .vision-core {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .hud-title {
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .hud-title span {
            color: var(--accent);
            float: right;
            animation: blink 1s infinite steps(2);
        }

        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        /* Cinematic Camera Viewport */
        .viewport {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #000;
            border: 1px solid rgba(255,255,255,0.02);
            overflow: hidden;
        }

        /* High-tech corner target brackets */
        .viewport::before, .viewport::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid var(--accent);
            z-index: 3;
            pointer-events: none;
        }
        .viewport::before { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
        .viewport::after { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

        #webcam-container {
            width: 100%;
            height: 100%;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            filter: grayscale(0.2) contrast(1.1);
            transition: filter 0.2s ease;
        }

        /* Tactical 3-Second Flash Effect */
        .capture-flash {
            animation: flashOverlay 0.25s cubic-bezier(0.1, 1, 0.1, 1);
        }
        @keyframes flashOverlay {
            0% { filter: brightness(3) contrast(1.5) saturate(2); }
            100% { filter: grayscale(0.2) contrast(1.1); }
        }

        /* Glass Trigger Button */
        .btn-hud {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 18px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-hud:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.4);
        }

        /* Right Column: Tactical Data Blocks */
        .data-stream {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #label-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .data-node {
            border-left: 2px solid var(--text-muted);
            padding-left: 1.25rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .data-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
        }

        .data-tag {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .data-output {
            font-size: 1.5rem;
            font-weight: bold;
            color: rgba(255,255,255,0.3);
        }

        /* Segmented Cyber Matrix Progress Bar */
        .matrix-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
            width: 100%;
        }

        .matrix-fill {
            height: 100%;
            width: 0%;
            background: var(--text-muted);
            transition: width 0.5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        /* Target State: When AI chooses this classification class */
        .data-node.targeted {
            border-left-color: var(--accent);
        }
        .data-node.targeted .data-tag {
            color: var(--text);
            font-weight: bold;
        }
        .data-node.targeted .data-output {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-dim);
        }
        .data-node.targeted .matrix-fill {
            background: linear-gradient(90deg, var(--accent), #00bfff);
            box-shadow: 0 0 10px rgba(0, 255, 170, 0.5);
        }

        .system-status {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="hud-container">
    <!-- Camera Viewport Section -->
    <div class="vision-core">
        <div class="hud-title">System // Matrix_Feed <span>● LIVE</span></div>
        <div class="viewport">
            <div id="webcam-container"></div>
        </div>
        <button type="button" class="btn-hud" id="init-trigger" onclick="init()">Link Neural Engine</button>
    </div>

    <!-- Live Data Visualization Section -->
    <div class="data-stream">
        <div>
            <div class="hud-title">Inference // Output_Logs</div>
            <div id="label-container">
                <!-- Data feeds drop in dynamically here -->
            </div>
        </div>
        
        <div class="system-status">
            <span>Freq: 0.33 Hz</span>
            <span>Interval: 3.0s</span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "./my_model/";

    let model, webcam, labelContainer, maxPredictions;
    let snapshotTimer;

    async function init() {
        document.getElementById("init-trigger").style.display = "none";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // 16:10 Cinematic aspect ratio resolution configuration
        webcam = new tmImage.Webcam(400, 250, true); 
        await webcam.setup(); 
        await webcam.play();
        
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
        
        // Setup minimalist UI nodes cleanly
        for (let i = 0; i < maxPredictions; i++) { 
            let node = document.createElement("div");
            node.className = "data-node";
            node.innerHTML = `
                <div class="data-header">
                    <span class="data-tag">Unlinked_Node</span>
                    <span class="data-output">00%</span>
                </div>
                <div class="matrix-bar">
                    <div class="matrix-fill"></div>
                </div>
            `;
            labelContainer.appendChild(node);
        }

        // Fire initial evaluation sequence
        await predict();

        // Rigid 3000ms evaluation interval looping block
        snapshotTimer = setInterval(async () => {
            triggerHardwareFlash();
            await predict();
        }, 3000);
    }

    async function loop() {
        webcam.update(); 
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        
        let leadIndex = 0;
        let maxVal = 0;
        for(let i=0; i<maxPredictions; i++) {
            if(prediction[i].probability > maxVal) {
                maxVal = prediction[i].probability;
                leadIndex = i;
            }
        }

        for (let i = 0; i < maxPredictions; i++) {
            const node = labelContainer.childNodes[i];
            const name = prediction[i].className;
            const percentage = (prediction[i].probability * 100).toFixed(0);
            
            node.querySelector('.data-tag').innerText = `[${i.toString().padStart(2, '0')}] ${name}`;
            node.querySelector('.data-output').innerText = `${percentage.padStart(2, '0')}%`;
            node.querySelector('.matrix-fill').style.width = percentage + "%";

            // Target lock highlighting
            if(i === leadIndex && maxVal > 0.1) {
                node.classList.add("targeted");
            } else {
                node.classList.remove("targeted");
            }
        }
    }

    function triggerHardwareFlash() {
        const el = document.querySelector("#webcam-container canvas");
        if(el) {
            el.classList.remove("capture-flash");
            void el.offsetWidth; 
            el.classList.add("capture-flash");
        }
    }
</script>

</body>
</html>
