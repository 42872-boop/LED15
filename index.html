<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine | Premium Vision AI</title>
    <style>
        :root {
            --bg-main: #06070d;
            --bg-card: #0d0f19;
            --accent-cyan: #00f2fe;
            --accent-pink: #ff007f;
            --accent-purple: #7000ff;
            --text-main: #f0f3f8;
            --text-muted: #6c7a9c;
            --border-color: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            letter-spacing: -0.01em;
        }

        /* Subtle glowing mesh background effect */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(112, 0, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: 10%;
            left: 15%;
            z-index: -1;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            bottom: 10%;
            right: 15%;
            z-index: -1;
        }

        .dashboard {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            width: 100%;
            max-width: 480px;
            padding: 2.5rem;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header p {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-cyan);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
        }

        /* Action Controls */
        .control-panel {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            color: #fff;
            border: none;
            padding: 14px 32px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(255, 0, 127, 0.3);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(255, 0, 127, 0.45);
            filter: brightness(1.1);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Viewport Frame styling */
        .viewport-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 2.5rem auto;
            border-radius: 20px;
            padding: 6px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border: 1px solid var(--border-color);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        }

        #webcam-container {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            background-color: #000;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* Cyberpunk scanline effect over live feed */
        .scanline {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            box-shadow: 0 0 10px var(--accent-cyan);
            z-index: 2;
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* Flash pulse indicator */
        .flash-triggered {
            animation: shutterFlash 0.3s ease-out;
        }

        @keyframes shutterFlash {
            0% { filter: brightness(2) contrast(0.8); }
            100% { filter: brightness(1) contrast(1); }
        }

        /* Output Metrics / Progress Rows */
        #label-container {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .metric-row {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .metric-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .metric-label {
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .metric-value {
            font-family: monospace;
            font-weight: 700;
            color: var(--text-main);
        }

        .progress-track {
            height: 6px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--text-muted);
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.1, 0.8, 0.3, 1), background-color 0.4s ease;
        }

        /* Winning active class row styling */
        .metric-row.active .metric-label {
            color: #fff;
            font-weight: 600;
        }

        .metric-row.active .metric-value {
            color: var(--accent-cyan);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .metric-row.active .progress-bar {
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.4);
        }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <p>AI Inference Engine</p>
        <h1>Vision Studio</h1>
    </header>

    <div class="control-panel">
        <button type="button" class="btn-primary" id="start-btn" onclick="init()">Initialize System</button>
    </div>
    
    <div class="viewport-wrapper">
        <div class="scanline" id="scanline-element"></div>
        <div id="webcam-container"></div>
    </div>

    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "./my_model/";

    let model, webcam, labelContainer, maxPredictions;
    let cameraInterval;

    async function init() {
        document.getElementById("start-btn").style.display = "none";
        document.getElementById("scanline-element").style.display = "block";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true; 
        webcam = new tmImage.Webcam(280, 280, flip); 
        await webcam.setup(); 
        await webcam.play();
        
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
        
        // Build empty structural layout elements for data presentation
        for (let i = 0; i < maxPredictions; i++) { 
            let row = document.createElement("div");
            row.className = "metric-row";
            row.innerHTML = `
                <div class="metric-info">
                    <span class="metric-label">Analyzing...</span>
                    <span class="metric-value">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-bar"></div>
                </div>
            `;
            labelContainer.appendChild(row);
        }

        // Run an instant baseline prediction
        await predict();

        // 3-second evaluation timer block
        cameraInterval = setInterval(async () => {
            triggerShutterEffect();
            await predict();
        }, 3000);
    }

    async function loop() {
        webcam.update(); 
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        
        // Discover top performing object arrays
        let highestIndex = 0;
        let maxProp = 0;
        for(let i=0; i<maxPredictions; i++) {
            if(prediction[i].probability > maxProp) {
                maxProp = prediction[i].probability;
                highestIndex = i;
            }
        }

        for (let i = 0; i < maxPredictions; i++) {
            const row = labelContainer.childNodes[i];
            const name = prediction[i].className;
            const rawProb = prediction[i].probability;
            const percentageString = (rawProb * 100).toFixed(0) + "%";
            
            // Inject targeted text components cleanly without destroying wrapper nodes
            row.querySelector('.metric-label').innerText = name;
            row.querySelector('.metric-value').innerText = percentageString;
            
            // Apply scale sizing constraints safely via percentage width assignments
            const bar = row.querySelector('.progress-bar');
            bar.style.width = (rawProb * 100) + "%";

            // Toggle focus glow classes targeting high-performing index arrays
            if(i === highestIndex && maxProp > 0.15) {
                row.classList.add("active");
            } else {
                row.classList.remove("active");
            }
        }
    }

    function triggerShutterEffect() {
        const camCanvas = document.querySelector("#webcam-container canvas");
        if(camCanvas) {
            camCanvas.classList.remove("flash-triggered");
            void camCanvas.offsetWidth; 
            camCanvas.classList.add("flash-triggered");
        }
    }
</script>

</body>
</html>
