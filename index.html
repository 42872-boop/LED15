<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMMERSE // CORE</title>
    <style>
        :root {
            --neon: #00f0ff;
            --neon-dim: rgba(0, 240, 255, 0.2);
            --bg-glass: rgba(6, 7, 13, 0.75);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body, html {
            background-color: #000;
            color: #fff;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* FIXED: Full Screen Webcam Wrapper allows elements to size contextually */
        #webcam-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #020205;
        }

        /* FIXED: Ensures the underlying Teachable Machine video canvas handles viewport bounds */
        #webcam-container canvas, #webcam-container video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            transform: scaleX(-1); /* Flips the mirror axis correctly */
            transition: filter 0.3s cubic-bezier(0.1, 1, 0.1, 1);
        }

        /* Full-screen shutter snap effect */
        .shutter-snap {
            animation: shutter 0.4s ease-out forwards;
        }

        @keyframes shutter {
            0% { filter: brightness(4) blur(4px) contrast(1.5); }
            40% { filter: brightness(0.2) blur(0px) contrast(2); }
            100% { filter: brightness(1) blur(0px) contrast(1); }
        }

        /* Cinematic Overlay UI Layer */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            pointer-events: none;
        }

        .ui-layer * {
            pointer-events: auto;
        }

        /* Top Bar Info */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 40px;
            border: 1px solid var(--border-glass);
        }

        /* Floating Target HUD in the Center */
        .center-hud {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        /* Reticle design layout elements */
        .reticle {
            position: relative;
            width: 180px;
            height: 180px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(2px);
        }

        .reticle::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid var(--neon);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-dim);
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .active-prediction {
            background: var(--bg-glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-glass);
            padding: 1.5rem 3rem;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .active-prediction.show {
            transform: translateY(0);
            opacity: 1;
        }

        .active-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
            margin-bottom: 0.25rem;
            text-transform: capitalize;
        }

        .active-confidence {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--neon);
            letter-spacing: 2px;
        }

        /* Interaction triggers */
        .bottom-controls {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .btn-trigger {
            background: #fff;
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .btn-trigger:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        #label-container {
            display: none;
        }
    </style>
</head>
<body>

<div id="webcam-container"></div>

<div class="ui-layer">
    <header>
        <div class="brand">NEXUS // VISION</div>
    </header>

    <div class="center-hud">
        <div class="reticle" id="hud-reticle"></div>
        <div class="active-prediction" id="prediction-card">
            <div class="active-title" id="class-target">Initializing</div>
            <div class="active-confidence" id="confidence-target">AWAITING SYSTEM</div>
        </div>
    </div>

    <div class="bottom-controls">
        <button type="button" class="btn-trigger" id="start-btn" onclick="init()">START ENGINE</button>
    </div>
</div>

<div id="label-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "./my_model/";

    let model, webcam, maxPredictions;
    let cameraInterval;

    async function init() {
        document.getElementById("start-btn").style.display = "none";
        
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // FIXED: Reverted to matching standard capture aspects while allowing layout stretch scaling
        const flip = true; 
        webcam = new tmImage.Webcam(400, 400, flip); 
        
        await webcam.setup(); 
        await webcam.play();
        
        window.requestAnimationFrame(loop);
        
        // Target specific DOM injection handling cleanly
        const container = document.getElementById("webcam-container");
        container.innerHTML = ""; // Clear out styling artifact boundaries
        container.appendChild(webcam.canvas);
        
        document.getElementById("prediction-card").classList.add("show");

        await predict();

        // Execution snapshot loop (Interval ticks accurately every 3000ms)
        cameraInterval = setInterval(async () => {
            triggerShutterEffect();
            await predict();
        }, 3000);
    }

    async function loop() {
        webcam.update(); 
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        if (!model || !webcam) return;
        
        const prediction = await model.predict(webcam.canvas);
        
        let highestIndex = 0;
        let maxProp = 0;
        for(let i=0; i<maxPredictions; i++) {
            if(prediction[i].probability > maxProp) {
                maxProp = prediction[i].probability;
                highestIndex = i;
            }
        }

        const nameTarget = prediction[highestIndex].className;
        const confidenceTarget = (prediction[highestIndex].probability * 100).toFixed(0);

        if (maxProp > 0.05) {
            document.getElementById("class-target").innerText = nameTarget;
            document.getElementById("confidence-target").innerText = `${confidenceTarget}% CONFIDENCE`;
            document.getElementById("hud-reticle").style.borderColor = "var(--neon)";
        } else {
            document.getElementById("class-target").innerText = "Scanning";
            document.getElementById("confidence-target").innerText = "SEARCHING MATRIX...";
            document.getElementById("hud-reticle").style.borderColor = "rgba(255, 255, 255, 0.15)";
        }
    }

    function triggerShutterEffect() {
        const targetCanvas = document.querySelector("#webcam-container canvas");
        if(targetCanvas) {
            targetCanvas.classList.remove("shutter-snap");
            void targetCanvas.offsetWidth; 
            targetCanvas.classList.add("shutter-snap");
        }
    }
</script>

</body>
</html>
