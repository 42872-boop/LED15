<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS ENGINE // VISION AI</title>
    <style>
        :root {
            --bg: #05060b;
            --panel: #0b0d19;
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.2);
            --text: #ffffff;
            --text-muted: #525a70;
            --border: rgba(255, 255, 255, 0.07);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
            letter-spacing: -0.01em;
            background-image: radial-gradient(circle at 50% 30%, #111428 0%, var(--bg) 70%);
        }

        .main-frame {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            text-align: center;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.25rem;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 2rem;
        }

        /* Camera Viewport Area */
        .camera-deck {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 2rem auto;
            background: #000;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Enforce native styling constraints directly to preserve TM rendering loop */
        #webcam-container {
            width: 320px;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam-container canvas {
            display: block !important;
            border-radius: 16px;
            width: 320px !important;
            height: 320px !important;
            object-fit: cover;
        }

        /* 3-Second Camera Flash Shutter Effect */
        .shutter-flash {
            animation: cameraFlash 0.35s ease-out forwards;
        }

        @keyframes cameraFlash {
            0% { filter: brightness(3) contrast(1.2); }
            100% { filter: brightness(1) contrast(1); }
        }

        /* Action Buttons */
        .btn-action {
            background: #fff;
            color: #000;
            border: none;
            padding: 16px 36px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,255,255,0.05);
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(255,255,255,0.1);
        }

        /* Modernized Data Feeds Rows */
        #label-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            text-align: left;
        }

        .data-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255,255,255,0.03);
            padding: 14px 18px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .class-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .class-val {
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
        }

        /* Target Highlighted Mode */
        .data-row.active {
            background: rgba(0, 240, 255, 0.05);
            border-color: rgba(0, 240, 255, 0.25);
            box-shadow: 0 5px 15px rgba(0, 240, 255, 0.05);
        }

        .data-row.active .class-label {
            color: #fff;
        }

        .data-row.active .class-val {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        #error-log {
            color: #ff4a4a;
            font-size: 0.85rem;
            margin-top: 1rem;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="main-frame">
    <header>
        <h1>NEXUS CORE</h1>
        <p>Intelligence Engine</p>
    </header>

    <div class="camera-deck">
        <div id="webcam-container">
            <!-- Camera canvas appends explicitly right here safely -->
        </div>
    </div>

    <button type="button" class="btn-action" id="start-btn" onclick="init()">INITIALIZE CAMERA</button>
    
    <div id="label-container"></div>
    <div id="error-log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    const URL = "./my_model/"; // Ensure your Teachable Machine model folder matches this relative link location

    let model, webcam, labelContainer, maxPredictions;
    let mainInterval;

    async function init() {
        const errorLog = document.getElementById("error-log");
        errorLog.innerText = ""; 

        try {
            document.getElementById("start-btn").style.display = "none";

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            // FIXED: Standardizing webcam instantiation constraints perfectly to avoid library internal capture faults
            webcam = new tmImage.Webcam(320, 320, flip); 
            
            await webcam.setup(); 
            await webcam.play();
            
            window.requestAnimationFrame(loop);

            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // Flush template elements out cleanly
            
            for (let i = 0; i < maxPredictions; i++) { 
                let row = document.createElement("div");
                row.className = "data-row";
                row.innerHTML = `<span class="class-label">Analyzing...</span><span class="class-val">0%</span>`;
                labelContainer.appendChild(row);
            }

            document.getElementById("webcam-container").appendChild(webcam.canvas);

            // Instant initial snapshot execution step
            await predict();

            // Run structural prediction operations exactly every 3 seconds
            mainInterval = setInterval(async () => {
                triggerHardwarePulse();
                await predict();
            }, 3000);

        } catch (err) {
            console.error(err);
            errorLog.innerText = "SYSTEM ERROR: " + err.message + "\nCheck camera permissions or secure context (HTTPS/Localhost).";
            document.getElementById("start-btn").style.display = "block";
        }
    }

    async function loop() {
        webcam.update(); 
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        if (!model || !webcam) return;
        
        const prediction = await model.predict(webcam.canvas);
        
        let leadIndex = 0;
        let maxVal = 0;
        for(let i = 0; i < maxPredictions; i++) {
            if(prediction[i].probability > maxVal) {
                maxVal = prediction[i].probability;
                leadIndex = i;
            }
        }

        for (let i = 0; i < maxPredictions; i++) {
            const row = labelContainer.childNodes[i];
            if (!row) continue;
            
            const name = prediction[i].className;
            const score = (prediction[i].probability * 100).toFixed(0) + "%";
            
            row.querySelector('.class-label').innerText = name;
            row.querySelector('.class-val').innerText = score;

            if(i === leadIndex && maxVal > 0.1) {
                row.classList.add("active");
            } else {
                row.classList.remove("active");
            }
        }
    }

    function triggerHardwarePulse() {
        const target = document.querySelector("#webcam-container canvas");
        if(target) {
            target.classList.remove("shutter-flash");
            void target.offsetWidth; 
            target.classList.add("shutter-flash");
        }
    }
</script>

</body>
</html>
